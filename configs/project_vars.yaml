random_seed: 42
results_dir: "results" # Path to the directory where results will be saved, meant for lightweight files, plots and logs
figure_force_save: True # Indicates whether the Plotter object should save a figure or display it. In envs with no display you'll want to set this to True
WANDB_PROJECT: "tmp" # This is more for bash than for within python. Will set the wandb logger to the right project
#benchmark_creation_model: "Qwen/Qwen3-32B" # Model used to create benchmark tasks
benchmark_creation_model: "gpt-4o-mini" # Model used to create benchmark tasks
evaluation_model_name: "Qwen/Qwen3-32B" # Model used for evaluation